name: PostgreSQL integration
on:
  pull_request:
  push:
    branches: [main]
jobs:
  postgres-integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: atlas_test
          POSTGRES_USER: atlas
          POSTGRES_PASSWORD: atlas_test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U atlas -d atlas_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    env:
      TEST_DATABASE_URL: postgresql://atlas:atlas_test_password@127.0.0.1:5432/atlas_test
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4.4.0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run live PostgreSQL integration
        shell: bash
        run: |
          set -o pipefail
          pnpm test:postgres 2>&1 | tee -a "$GITHUB_STEP_SUMMARY"
