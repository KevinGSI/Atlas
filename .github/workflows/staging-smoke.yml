name: Atlas staging smoke test
on:
  workflow_dispatch:
jobs:
  smoke-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 10
    env:
      STAGING_BASE_URL: ${{ secrets.STAGING_BASE_URL }}
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4.4.0
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Verify staging URL is configured
        run: test -n "$STAGING_BASE_URL"
      - name: Run connected Atlas pilot smoke test
        run: pnpm test:staging
