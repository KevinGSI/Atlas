services:
  - type: web
    name: atlas-api
    runtime: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    dockerContext: .
    preDeployCommand: node scripts/check-launch.js && node scripts/migrate.js
    healthCheckPath: /ready
    autoDeployTrigger: commit
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: atlas-postgres
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: TRUST_PROXY
        value: true
      - key: PUBLIC_BASE_URL
        sync: false
      - key: DATABASE_POOL_SIZE
        value: 10
      - key: MAX_BODY_BYTES
        value: 1048576
      - key: RATE_LIMIT_AUTH_REQUESTS
        value: 30
      - key: RATE_LIMIT_AI_REQUESTS
        value: 30
      - key: RATE_LIMIT_FILE_REQUESTS
        value: 20
      - key: RATE_LIMIT_WRITE_REQUESTS
        value: 120
      - key: RATE_LIMIT_WEBHOOK_REQUESTS
        value: 300
      - key: DOCUMENT_MAX_BYTES
        value: 25000000
      - key: DOCUMENT_STORAGE_PROVIDER
        value: postgres
      - key: FILE_MALWARE_SCANNER
        value: clamav
      - key: CLAMAV_HOST
        sync: false
      - key: CLAMAV_PORT
        value: 3310
      - key: CORS_ORIGINS
        sync: false
      - key: AUTH_TOKEN_SECRET
        generateValue: true
      - key: MFA_ENCRYPTION_KEY
        sync: false
      - key: AI_PROVIDER
        value: openai
      - key: AI_MODEL
        value: gpt-4.1-mini
      - key: AI_EMBEDDING_MODEL
        value: text-embedding-3-small
      - key: AI_EMBEDDING_DIMENSIONS
        value: 512
      - key: AI_WEB_SEARCH_ENABLED
        value: true
      - key: AI_WEB_SEARCH_CONTEXT_SIZE
        value: medium
      - key: OPENAI_API_KEY
        sync: false
      - key: AI_CONTENT_ENCRYPTION_KEY
        sync: false
      - key: CMS_CREDENTIAL_ENCRYPTION_KEY
        sync: false
      - key: CMS_SYNC_ENABLED
        value: true
      - key: GOOGLE_WORKSPACE_CLIENT_ID
        sync: false
      - key: GOOGLE_WORKSPACE_CLIENT_SECRET
        sync: false
      - key: MICROSOFT_365_CLIENT_ID
        sync: false
      - key: MICROSOFT_365_CLIENT_SECRET
        sync: false
      - key: MICROSOFT_365_TENANT
        value: organizations
      - key: QUICKBOOKS_CLIENT_ID
        sync: false
      - key: QUICKBOOKS_CLIENT_SECRET
        sync: false
      - key: QUICKBOOKS_ENVIRONMENT
        value: production
      - key: INGESTION_WEBHOOK_SECRETS
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: PAYMENT_CHECKOUT_SIGNING_SECRET
        generateValue: true
      - key: PAYMENT_RETURN_URL
        sync: false
  - type: worker
    name: atlas-intelligence-worker
    runtime: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    dockerContext: .
    dockerCommand: node scripts/intelligence-worker.js
    autoDeployTrigger: commit
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: atlas-postgres
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: AUTH_TOKEN_SECRET
        sync: false
      - key: MFA_ENCRYPTION_KEY
        sync: false
      - key: AI_PROVIDER
        value: openai
      - key: AI_MODEL
        value: gpt-4.1-mini
      - key: AI_EMBEDDING_MODEL
        value: text-embedding-3-small
      - key: AI_EMBEDDING_DIMENSIONS
        value: 512
      - key: OPENAI_API_KEY
        sync: false
      - key: AI_CONTENT_ENCRYPTION_KEY
        sync: false
      - key: FILE_MALWARE_SCANNER
        value: clamav
      - key: CLAMAV_HOST
        sync: false
      - key: CLAMAV_PORT
        value: 3310

databases:
  - name: atlas-postgres
    plan: basic-256mb
    databaseName: atlas
    user: atlas
