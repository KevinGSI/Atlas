services:
  - type: web
    name: atlas-api
    runtime: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    dockerContext: .
    preDeployCommand: node scripts/migrate.js
    healthCheckPath: /ready
    autoDeployTrigger: commit
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: atlas-postgres
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: DATABASE_POOL_SIZE
        value: 10
      - key: MAX_BODY_BYTES
        value: 1048576
      - key: CORS_ORIGINS
        sync: false
      - key: AUTH_TOKEN_SECRET
        generateValue: true
  - type: worker
    name: atlas-intelligence-worker
    runtime: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    dockerContext: .
    dockerCommand: node scripts/intelligence-worker.js
    autoDeployTrigger: commit
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: atlas-postgres
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: AUTH_TOKEN_SECRET
        sync: false
      - key: AI_PROVIDER
        sync: false
      - key: AI_MODEL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: AI_CONTENT_ENCRYPTION_KEY
        sync: false

databases:
  - name: atlas-postgres
    plan: basic-256mb
    databaseName: atlas
    user: atlas
